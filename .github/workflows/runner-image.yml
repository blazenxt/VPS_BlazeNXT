name: Build isolated runner
on:
  push:
    branches: [main]
    paths: ["runner/**", ".github/workflows/runner-image.yml"]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vps-blazenxt-runner:latest
          platforms: linux/amd64
          provenance: true
